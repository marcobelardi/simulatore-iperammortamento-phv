<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulatore Iper 2026 â Calcolo beneficio e montanti annuali</title>
<meta name="description" content="Simulatore interattivo Iperammortamento 2026 â L. 199/2025, commi 427-436. Calcolo beneficio IRES e montanti annuali per fasce progressive.">
<meta name="author" content="Ing. Marco Belardi â LEAN4DIGITAL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #fff; color: #0f172a; min-height: 100vh; }
  #root { max-width: 920px; margin: 24px auto; padding: 0 16px; }
  input, select, button { font-family: inherit; }
  @media (max-width: 700px) {
    #root { padding: 0 8px; margin: 12px auto; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, Cell } = Recharts;

const BRACKETS = [
  { limit: 2500000, rate: 1.80, ires: 0.432, label: "180% (fino a 2,5M)" },
  { limit: 10000000, rate: 1.00, ires: 0.24, label: "100% (2,5M\u201310M)" },
  { limit: 20000000, rate: 0.50, ires: 0.12, label: "50% (10M\u201320M)" },
];

const fmt = (v) => new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(v);
const fmtPct = (v) => (v * 100).toFixed(1) + "%";

const COLORS = { b40: "#2563eb", fer: "#059669", benefit: "#d97706", bracket1: "#3b82f6", bracket2: "#f59e0b", bracket3: "#ef4444" };

const initialBeni = [
  {
    id: "A1", name: "Isola robotizzata di pressofusione", classif: "All.IV\u00b7GI\u00b7P3", type: "b40",
    complex: true, value: 0,
    components: [
      { id: "A1.1", name: "Centro di lavoro CNC 5 assi", value: 800000, ae: 2026 },
      { id: "A1.2", name: "Robot antropomorfo di asservimento", value: 450000, ae: 2026 },
      { id: "A1.3", name: "Sistema di visione e controllo qualit\u00e0", value: 350000, ae: 2027 },
      { id: "A1.4", name: "Nastro trasportatore intelligente", value: 200000, ae: 2027 },
    ],
  },
  { id: "A2", name: "Magazzino automatico verticale", classif: "All.IV\u00b7GI\u00b7P11", type: "b40", complex: false, value: 1200000, ae: 2026, components: [] },
  { id: "A3", name: "Linea di assemblaggio robotizzata", classif: "All.IV\u00b7GI\u00b7P3", type: "b40", complex: false, value: 900000, ae: 2027, components: [] },
  { id: "A4", name: "Sistema AGV trasporto interno", classif: "All.IV\u00b7GI\u00b7P4", type: "b40", complex: false, value: 400000, ae: 2027, components: [] },
  { id: "B1", name: "MES \u2013 Manufacturing Execution System", classif: "All.V\u00b7GI\u00b7P2", type: "b40", complex: false, value: 350000, ae: 2026, components: [] },
  { id: "B2", name: "Digital Twin piattaforma simulazione", classif: "All.V\u00b7GI\u00b7P3", type: "b40", complex: false, value: 250000, ae: 2027, components: [] },
  { id: "FV1", name: "Impianto fotovoltaico 500 kWp", classif: "FER\u00b7Fotovoltaico", type: "fer", complex: false, value: 600000, ae: 2027, components: [] },
];

function calcBeneValue(b) {
  if (b.complex && b.components.length > 0) return b.components.reduce((s, c) => s + (c.value || 0), 0);
  return b.value || 0;
}

function calcBrackets(amount) {
  let remaining = Math.min(amount, 20000000);
  let prev = 0;
  const result = [];
  let totalMagg = 0, totalBenefit = 0;
  for (const br of BRACKETS) {
    const inBracket = Math.max(0, Math.min(remaining, br.limit - prev));
    const magg = inBracket * br.rate;
    const benefit = inBracket * br.ires;
    result.push({ ...br, base: inBracket, maggiorazione: magg, benefit });
    totalMagg += magg;
    totalBenefit += benefit;
    remaining -= inBracket;
    prev = br.limit;
  }
  return { brackets: result, totalMagg, totalBenefit };
}

function Badge({ type }) {
  const styles = {
    b40: { bg: "#dbeafe", color: "#1e40af", label: "B4.0" },
    fer: { bg: "#d1fae5", color: "#065f46", label: "FER" },
    complex: { bg: "#fef3c7", color: "#92400e", label: "Complesso" },
  };
  const s = styles[type];
  return <span style={{ display: "inline-block", fontSize: 10, fontWeight: 600, padding: "1px 6px", borderRadius: 4, background: s.bg, color: s.color, letterSpacing: ".3px" }}>{s.label}</span>;
}

function MetricCard({ label, value, sub, accent }) {
  return (
    <div style={{ background: accent ? "#1e293b" : "#f8fafc", borderRadius: 8, padding: "12px 16px", border: accent ? "none" : "1px solid #e2e8f0" }}>
      <div style={{ fontSize: 11, color: accent ? "#94a3b8" : "#64748b", marginBottom: 2, textTransform: "uppercase", letterSpacing: ".5px" }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 600, color: accent ? "#fff" : "#0f172a", fontVariantNumeric: "tabular-nums" }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: accent ? "#94a3b8" : "#64748b", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function Simulator() {
  const [beni, setBeni] = useState(initialBeni);
  const [showDetail, setShowDetail] = useState(null);

  const analysis = useMemo(() => {
    const years = {};
    const totals = { b40: 0, fer: 0 };

    for (const b of beni) {
      const val = calcBeneValue(b);
      totals[b.type] += val;

      if (b.complex && b.components.length > 0) {
        for (const c of b.components) {
          const y = c.ae || 2026;
          if (!years[y]) years[y] = { b40: 0, fer: 0, total: 0, beni: [] };
          years[y][b.type] += c.value || 0;
          years[y].total += c.value || 0;
          years[y].beni.push({ id: `${b.id}\u2192${c.id}`, name: c.name, value: c.value, type: b.type, parent: b.name });
        }
      } else {
        const y = b.ae || 2026;
        if (!years[y]) years[y] = { b40: 0, fer: 0, total: 0, beni: [] };
        years[y][b.type] += val;
        years[y].total += val;
        years[y].beni.push({ id: b.id, name: b.name, value: val, type: b.type });
      }
    }

    const yearKeys = Object.keys(years).sort();
    let grandBenefit = 0;
    const yearAnalysis = yearKeys.map((y) => {
      const d = years[y];
      const bc = calcBrackets(d.total);
      grandBenefit += bc.totalBenefit;
      return { year: y, ...d, ...bc };
    });

    return { totals, total: totals.b40 + totals.fer, yearAnalysis, grandBenefit };
  }, [beni]);

  const chartData = analysis.yearAnalysis.map((y) => ({
    year: y.year,
    "B4.0": y.b40,
    FER: y.fer,
    Beneficio: y.totalBenefit,
  }));

  const updateBeneField = (idx, field, val) => {
    const next = [...beni];
    next[idx] = { ...next[idx], [field]: val };
    setBeni(next);
  };

  const updateComponent = (bIdx, cIdx, field, val) => {
    const next = [...beni];
    const comps = [...next[bIdx].components];
    comps[cIdx] = { ...comps[cIdx], [field]: val };
    next[bIdx] = { ...next[bIdx], components: comps };
    setBeni(next);
  };

  const addBene = () => {
    const id = `N${Date.now().toString(36).slice(-3).toUpperCase()}`;
    setBeni([...beni, { id, name: "Nuovo bene", classif: "All.IV\u00b7GI\u00b7P1", type: "b40", complex: false, value: 100000, ae: 2026, components: [] }]);
  };

  const removeBene = (idx) => setBeni(beni.filter((_, i) => i !== idx));

  const toggleComplex = (idx) => {
    const next = [...beni];
    const b = next[idx];
    if (!b.complex) {
      next[idx] = { ...b, complex: true, components: [{ id: `${b.id}.1`, name: "Componente 1", value: b.value, ae: b.ae || 2026 }] };
    } else {
      const total = b.components.reduce((s, c) => s + (c.value || 0), 0);
      next[idx] = { ...b, complex: false, value: total, ae: b.components[0]?.ae || 2026, components: [] };
    }
    setBeni(next);
  };

  const addComponent = (idx) => {
    const next = [...beni];
    const b = next[idx];
    const cid = `${b.id}.${b.components.length + 1}`;
    next[idx] = { ...b, components: [...b.components, { id: cid, name: "Nuovo componente", value: 0, ae: 2026 }] };
    setBeni(next);
  };

  const removeComponent = (bIdx, cIdx) => {
    const next = [...beni];
    next[bIdx] = { ...next[bIdx], components: next[bIdx].components.filter((_, i) => i !== cIdx) };
    setBeni(next);
  };

  return (
    <div style={{ fontFamily: "'Inter', system-ui, -apple-system, sans-serif", maxWidth: 900, margin: "0 auto", padding: "0 8px" }}>
      <div style={{ borderBottom: "2px solid #0f172a", paddingBottom: 12, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>LEAN4DIGITAL &middot; Simulatore</div>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: "#0f172a", margin: 0, lineHeight: 1.3 }}>Iperammortamento 2026 &mdash; Calcolo beneficio e montanti annuali</h1>
        <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>L. 199/2025, commi 427-436 &middot; Criterio: per impresa e per periodo d&rsquo;imposta</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 24 }}>
        <MetricCard label="Investimento totale" value={fmt(analysis.total)} sub={`B4.0: ${fmt(analysis.totals.b40)} \u00b7 FER: ${fmt(analysis.totals.fer)}`} />
        <MetricCard label="Beneficio IRES totale" value={fmt(analysis.grandBenefit)} sub={`Aliquota effettiva: ${fmtPct(analysis.total > 0 ? analysis.grandBenefit / analysis.total : 0)}`} accent />
        <MetricCard label="N. beni" value={beni.length} sub={`Di cui complessi: ${beni.filter(b => b.complex).length}`} />
        <MetricCard label="Periodi d'imposta" value={analysis.yearAnalysis.length} sub={analysis.yearAnalysis.map(y => y.year).join(", ")} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
        <div>
          <h3 style={{ fontSize: 13, fontWeight: 600, color: "#334155", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".5px" }}>Montanti annuali per tipologia</h3>
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={chartData} barGap={2}>
                <XAxis dataKey="year" tick={{ fontSize: 12 }} />
                <YAxis tick={{ fontSize: 11 }} tickFormatter={v => `${(v / 1e6).toFixed(1)}M`} />
                <Tooltip formatter={(v) => fmt(v)} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                <Bar dataKey="B4.0" fill={COLORS.b40} radius={[3, 3, 0, 0]} />
                <Bar dataKey="FER" fill={COLORS.fer} radius={[3, 3, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div>
          <h3 style={{ fontSize: 13, fontWeight: 600, color: "#334155", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".5px" }}>Beneficio IRES per anno</h3>
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={chartData} barGap={2}>
                <XAxis dataKey="year" tick={{ fontSize: 12 }} />
                <YAxis tick={{ fontSize: 11 }} tickFormatter={v => `${(v / 1e3).toFixed(0)}k`} />
                <Tooltip formatter={(v) => fmt(v)} />
                <Bar dataKey="Beneficio" radius={[3, 3, 0, 0]}>
                  {chartData.map((_, i) => <Cell key={i} fill={COLORS.benefit} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      {analysis.yearAnalysis.map((ya) => (
        <div key={ya.year} style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: 14, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <span style={{ fontSize: 15, fontWeight: 600, color: "#0f172a" }}>AE {ya.year}</span>
              <span style={{ fontSize: 12, color: "#64748b", marginLeft: 8 }}>Montante: {fmt(ya.total)}</span>
            </div>
            <span style={{ fontSize: 14, fontWeight: 600, color: "#d97706" }}>Beneficio: {fmt(ya.totalBenefit)}</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            {ya.brackets.filter(br => br.base > 0).map((br, i) => (
              <div key={i} style={{ flex: 1, minWidth: 160, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, padding: "6px 10px" }}>
                <div style={{ fontSize: 10, color: "#64748b" }}>{br.label}</div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{fmt(br.base)} <span style={{ fontWeight: 400, color: "#64748b" }}>&times; {fmtPct(br.ires)}</span></div>
                <div style={{ fontSize: 12, color: "#d97706", fontWeight: 500 }}>= {fmt(br.benefit)}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: "#64748b" }}>
            Composizione: B4.0 {fmt(ya.b40)} + FER {fmt(ya.fer)}
            {ya.total > 2500000 && <span style={{ color: "#dc2626", fontWeight: 500 }}> &mdash; Supera soglia 2,5M: aliquota marginale al 24%</span>}
          </div>
        </div>
      ))}

      <h3 style={{ fontSize: 13, fontWeight: 600, color: "#334155", marginBottom: 8, marginTop: 24, textTransform: "uppercase", letterSpacing: ".5px" }}>Elenco beni &mdash; modifica i valori per simulare scenari</h3>

      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ borderBottom: "2px solid #cbd5e1" }}>
              {["CB", "Nome bene", "Classificazione", "Tipo", "", "Valore \u20ac", "AE", ""].map((h, i) => (
                <th key={i} style={{ textAlign: "left", padding: "6px 4px", fontSize: 11, color: "#64748b", fontWeight: 500 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {beni.map((b, idx) => {
              const val = calcBeneValue(b);
              return (
                <React.Fragment key={b.id}>
                  <tr style={{ borderBottom: "1px solid #e2e8f0", background: b.complex ? "#fffbeb" : "transparent" }}>
                    <td style={{ padding: "5px 4px", fontWeight: 600, fontSize: 11 }}>{b.id}</td>
                    <td style={{ padding: "5px 4px" }}>
                      <input value={b.name} onChange={e => updateBeneField(idx, "name", e.target.value)}
                        style={{ border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", fontSize: 12, width: "100%", background: "transparent" }} />
                    </td>
                    <td style={{ padding: "5px 4px", fontSize: 11, color: "#64748b" }}>{b.classif}</td>
                    <td style={{ padding: "5px 4px" }}>
                      <select value={b.type} onChange={e => updateBeneField(idx, "type", e.target.value)}
                        style={{ border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 4px", fontSize: 11 }}>
                        <option value="b40">B4.0</option>
                        <option value="fer">FER</option>
                      </select>
                    </td>
                    <td style={{ padding: "5px 4px" }}>
                      <button onClick={() => toggleComplex(idx)}
                        style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, border: b.complex ? "1px solid #d97706" : "1px solid #cbd5e1", background: b.complex ? "#fef3c7" : "transparent", color: b.complex ? "#92400e" : "#64748b", cursor: "pointer" }}>
                        {b.complex ? "\u2726 C" : "C"}
                      </button>
                    </td>
                    <td style={{ padding: "5px 4px", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
                      {b.complex
                        ? <span style={{ fontStyle: "italic", color: "#2563eb" }}>{fmt(val)}</span>
                        : <input type="number" value={b.value} onChange={e => updateBeneField(idx, "value", Number(e.target.value))}
                            style={{ border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", fontSize: 12, width: 110, textAlign: "right" }} />
                      }
                    </td>
                    <td style={{ padding: "5px 4px" }}>
                      {!b.complex && (
                        <select value={b.ae || 2026} onChange={e => updateBeneField(idx, "ae", Number(e.target.value))}
                          style={{ border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 4px", fontSize: 11 }}>
                          {[2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      )}
                    </td>
                    <td style={{ padding: "5px 4px" }}>
                      <button onClick={() => removeBene(idx)} style={{ fontSize: 11, color: "#dc2626", background: "transparent", border: "none", cursor: "pointer" }}>&times;</button>
                    </td>
                  </tr>
                  {b.complex && b.components.map((c, ci) => (
                    <tr key={c.id} style={{ borderBottom: "1px dashed #e2e8f0", background: "#fefce8" }}>
                      <td style={{ padding: "3px 4px 3px 16px", fontSize: 10, color: "#92400e" }}>&darr; {c.id}</td>
                      <td style={{ padding: "3px 4px" }}>
                        <input value={c.name} onChange={e => updateComponent(idx, ci, "name", e.target.value)}
                          style={{ border: "1px solid #fde68a", borderRadius: 4, padding: "1px 6px", fontSize: 11, width: "100%", background: "#fffbeb" }} />
                      </td>
                      <td style={{ padding: "3px 4px", fontSize: 10, color: "#a3a3a3" }}>ereditata</td>
                      <td></td><td></td>
                      <td style={{ padding: "3px 4px", textAlign: "right" }}>
                        <input type="number" value={c.value} onChange={e => updateComponent(idx, ci, "value", Number(e.target.value))}
                          style={{ border: "1px solid #fde68a", borderRadius: 4, padding: "1px 6px", fontSize: 11, width: 100, textAlign: "right", background: "#fffbeb" }} />
                      </td>
                      <td style={{ padding: "3px 4px" }}>
                        <select value={c.ae || 2026} onChange={e => updateComponent(idx, ci, "ae", Number(e.target.value))}
                          style={{ border: "1px solid #fde68a", borderRadius: 4, padding: "1px 3px", fontSize: 10, background: "#fffbeb" }}>
                          {[2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      </td>
                      <td style={{ padding: "3px 4px" }}>
                        <button onClick={() => removeComponent(idx, ci)} style={{ fontSize: 10, color: "#dc2626", background: "transparent", border: "none", cursor: "pointer" }}>&times;</button>
                      </td>
                    </tr>
                  ))}
                  {b.complex && (
                    <tr style={{ background: "#fefce8" }}>
                      <td colSpan={8} style={{ padding: "2px 16px" }}>
                        <button onClick={() => addComponent(idx)}
                          style={{ fontSize: 10, color: "#92400e", background: "transparent", border: "1px dashed #d97706", borderRadius: 4, padding: "1px 8px", cursor: "pointer" }}>
                          + componente
                        </button>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>

      <button onClick={addBene}
        style={{ marginTop: 8, fontSize: 12, padding: "4px 16px", borderRadius: 6, border: "1px solid #cbd5e1", background: "#fff", cursor: "pointer", color: "#334155" }}>
        + Aggiungi bene
      </button>

      <div style={{ marginTop: 24, padding: 12, background: "#f1f5f9", borderRadius: 8, fontSize: 11, color: "#475569", lineHeight: 1.6 }}>
        <strong>Note metodologiche.</strong> Le aliquote di beneficio effettivo IRES sono: 43,2% (= 180% &times; 24%) per la prima fascia fino a 2,5M&euro;; 24% (= 100% &times; 24%) per la seconda fascia da 2,5M a 10M&euro;; 12% (= 50% &times; 24%) per la terza fascia da 10M a 20M&euro;. Il criterio di calcolo delle soglie &egrave; per impresa e per periodo d&rsquo;imposta (montante annuale). I beni complessi sono scomposti per componente ai fini dell&rsquo;allocazione ai montanti annuali ex art. 109 TUIR. Il beneficio &egrave; distribuito sull&rsquo;intero periodo di ammortamento fiscale del bene.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Simulator />);
</script>
</body>
</html>
